
<svg xmlns="http://www.w3.org/2000/svg"
   width="1200" height="300"
   viewBox="0 0 1275 10">

<!-- ===== GLYPH DEFINITIONS (LOCAL COORDS ONLY) ===== -->
<defs>
  <g id="p">
    <line x1="0" y1="0" x2="0" y2="100"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
  </g>
  <g id="b">
    <line x1="0" y1="0" x2="0" y2="100"/>
    <line x1="0" y1="100" x2="50" y2="100"/>
  </g>
  <g id="t">
    <line x1="50" y1="0" x2="50" y2="100"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
  </g>
  <g id="k">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="100"/>
  </g>
  <g id="f">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
  </g>
  <g id="sh">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="50"/>
  </g>
  <g id="zh">
    <line x1="0" y1="0" x2="0" y2="50"/>
  </g>
  <g id="h">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="50"/>
    <line x1="50" y1="50" x2="50" y2="100"/>
  </g>
  <g id="u">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
    <line x1="50" y1="0" x2="50" y2="50"/>
  </g>
  <g id="o">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
  </g>
  <g id="ough">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="50"/>
  </g>
  <g id="a">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="0" x2="50" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="100"/>
  </g>
  <g id="*">
    <line x1="50" y1="0" x2="50" y2="50"/>
    <line x1="50" y1="0" x2="100" y2="50"/>
    <line x1="50" y1="50" x2="0" y2="100"/>
  </g>
  <g id="mb">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="100"/>
  </g>
  <g id="ng">
    <line x1="0" y1="0" x2="0" y2="50"/>
    <line x1="0" y1="50" x2="50" y2="0"/>
    <line x1="0" y1="50" x2="50" y2="100"/>
  </g>
  <g id="uktuf">
    <use href="#u" transform="translate(50,0)"/>
    <use href="#k" transform="translate(125,0)"/>
    <use href="#t" transform="translate(150,0)"/>
    <use href="#u" transform="translate(225,0)"/>
    <use href="#f" transform="translate(300,0)"/>
  </g>
  <g id="ngufo*">
    <use href="#ng" transform="translate(50,0)"/>
    <use href="#u" transform="translate(125,0)"/>
    <use href="#f" transform="translate(200,0)"/>
    <use href="#o" transform="translate(275,0)"/>
    <use href="#*" transform="translate(300,0)"/>
  </g>
  <g id="kofa">
    <use href="#k" transform="translate(50,0)"/>
    <use href="#o" transform="translate(100,0)"/>
    <use href="#f" transform="translate(175,0)"/>
    <use href="#a" transform="translate(250,0)"/>
  </g>
  <g id="fash">
    <use href="#f" transform="translate(50,0)"/>
    <use href="#a" transform="translate(125,0)"/>
    <use href="#sh" transform="translate(200,0)"/>
  </g>
  <g id="osh">
    <use href="#o" transform="translate(50,0)"/>
    <use href="#sh" transform="translate(125,0)"/>
  </g>
  <g id="ushko">
    <use href="#u" transform="translate(50,0)"/>
    <use href="#sh" transform="translate(125,0)"/>
    <use href="#k" transform="translate(200,0)"/>
    <use href="#o" transform="translate(225,0)"/>
  </g>
</defs>

<g stroke="#bac2de" stroke-width="10" stroke-linecap="square" fill="none">
  <use href="#uktuf" transform="translate(50,-125)"/>
  <use href="#ngufo*" transform="translate(50,0)"/>

  <use href="#kofa" transform="translate(475,0)"/>
  <use href="#fash" transform="translate(750,-125)"/>
  <use href="#osh" transform="translate(750,0)"/>
  <use href="#ushko" transform="translate(900,0)"/>
</g>
</svg>