
<svg xmlns="http://www.w3.org/2000/svg"
   width="300" height="150"
   viewBox="0 0 375 100">

<!-- ===== GLYPH DEFINITIONS (LOCAL COORDS ONLY) ===== -->
<defs>
  <g id="p">
    <line x1="0" y1="0" x2="0" y2="100"/>
    <line x1="0" y1="0" x2="50" y2="0"/>
  </g>
  <g id="b">
    <line x1="0" y1="0" x2="0" y2="100"/>
